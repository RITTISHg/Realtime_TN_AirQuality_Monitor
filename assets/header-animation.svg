<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8">
        <animate attributeName="stop-color" values="#818cf8;#22d3ee;#a78bfa;#818cf8" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#a78bfa;#818cf8;#22d3ee" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf880"/>
      <stop offset="50%" style="stop-color:#22d3ee80"/>
      <stop offset="100%" style="stop-color:#a78bfa80"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)" rx="12"/>
  
  <!-- Animated ambient orbs -->
  <circle cx="150" cy="80" r="60" fill="#818cf8" opacity="0.04">
    <animate attributeName="r" values="60;80;60" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.04;0.08;0.04" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="220" r="50" fill="#22d3ee" opacity="0.04">
    <animate attributeName="r" values="50;70;50" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.04;0.07;0.04" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="150" r="40" fill="#a78bfa" opacity="0.03">
    <animate attributeName="r" values="40;55;40" dur="7s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Animated particles -->
  <circle cx="100" cy="50" r="1.5" fill="#818cf8" opacity="0.6" filter="url(#glow)">
    <animate attributeName="cy" values="50;250;50" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="200" r="1" fill="#22d3ee" opacity="0.5" filter="url(#glow)">
    <animate attributeName="cy" values="200;30;200" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="300;350;300" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="100" r="1.5" fill="#a78bfa" opacity="0.4" filter="url(#glow)">
    <animate attributeName="cy" values="100;270;100" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="150" r="1" fill="#34d399" opacity="0.5" filter="url(#glow)">
    <animate attributeName="cy" values="150;20;150" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="800;760;800" dur="7s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Animated wave/pulse line -->
  <path d="M 0 200 Q 100 180 200 200 Q 300 220 400 195 Q 500 170 600 200 Q 700 230 800 200 Q 850 185 900 200" 
        fill="none" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.3">
    <animate attributeName="d" 
      values="M 0 200 Q 100 180 200 200 Q 300 220 400 195 Q 500 170 600 200 Q 700 230 800 200 Q 850 185 900 200;
              M 0 200 Q 100 220 200 195 Q 300 170 400 200 Q 500 230 600 195 Q 700 170 800 200 Q 850 215 900 200;
              M 0 200 Q 100 180 200 200 Q 300 220 400 195 Q 500 170 600 200 Q 700 230 800 200 Q 850 185 900 200"
      dur="6s" repeatCount="indefinite"/>
  </path>
  <path d="M 0 210 Q 150 190 300 210 Q 450 230 600 205 Q 750 180 900 210" 
        fill="none" stroke="url(#lineGrad)" stroke-width="1" opacity="0.15">
    <animate attributeName="d" 
      values="M 0 210 Q 150 190 300 210 Q 450 230 600 205 Q 750 180 900 210;
              M 0 210 Q 150 230 300 205 Q 450 180 600 210 Q 750 230 900 210;
              M 0 210 Q 150 190 300 210 Q 450 230 600 205 Q 750 180 900 210"
      dur="8s" repeatCount="indefinite"/>
  </path>
  
  <!-- Logo circle -->
  <circle cx="450" cy="85" r="28" fill="none" stroke="url(#textGrad)" stroke-width="2.5" filter="url(#glow)">
    <animate attributeName="r" values="28;30;28" dur="3s" repeatCount="indefinite"/>
  </circle>
  <path d="M 438 100 C 440 92 444 84 450 84 C 456 84 460 92 462 100" stroke="url(#textGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="450" cy="78" r="3" fill="url(#textGrad)">
    <animate attributeName="r" values="3;3.5;3" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="450" y="150" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="800" 
        fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)" letter-spacing="-1">
    AirPulse
  </text>
  
  <!-- Subtitle -->
  <text x="450" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="13" 
        fill="#94a3b8" text-anchor="middle" letter-spacing="4" font-weight="500">
    REAL-TIME AIR QUALITY DASHBOARD
  </text>
  
  <!-- Tagline -->
  <text x="450" y="245" font-family="'Segoe UI', Arial, sans-serif" font-size="14" 
        fill="#64748b" text-anchor="middle" letter-spacing="0.5">
    Monitor • Analyze • Breathe Better 🇮🇳
  </text>
  
  <!-- Animated bottom dots -->
  <circle cx="420" cy="265" r="3" fill="#34d399" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="435" cy="265" r="3" fill="#fbbf24" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="265" r="3" fill="#f97316" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="465" cy="265" r="3" fill="#ef4444" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="265" r="3" fill="#dc2626" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>
